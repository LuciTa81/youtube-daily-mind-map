name: Quality Gates

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    paths:
      - ".github/**"
      - "docs/**"
      - "scripts/**"
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vitest.config.mjs"
      - "eslint.config.mjs"
      - "next.config.ts"
      - "tailwind.config.ts"
      - "postcss.config.mjs"

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Import surface smoke
        run: |
          node scripts/serve-static-out.mjs &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT

          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3001 >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:3001 >/dev/null
          npm run smoke:import-surface

      - name: Upload import surface smoke evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: import-surface-smoke
          path: .codex/import-surface-smoke/
          if-no-files-found: ignore
          retention-days: 7
