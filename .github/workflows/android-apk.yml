name: Build Android APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android/**"
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.ts"
      - "next.config.ts"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Android assets
        run: npx cap sync android

      - name: Make Gradle executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Restore smoke debug keystore
        env:
          SMOKE_DEBUG_KEYSTORE_BASE64: ${{ secrets.SMOKE_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$SMOKE_DEBUG_KEYSTORE_BASE64" ]; then
            echo "Smoke debug keystore secret is not configured; using the runner debug signing key for clean-install artifacts."
            exit 0
          fi
          printf '%s' "$SMOKE_DEBUG_KEYSTORE_BASE64" | base64 --decode > android/app/smoke-debug.keystore

      - name: Build debug APK
        working-directory: android
        env:
          SMOKE_DEBUG_KEYSTORE_FILE: smoke-debug.keystore
          SMOKE_DEBUG_KEYSTORE_PASSWORD: ${{ secrets.SMOKE_DEBUG_KEYSTORE_PASSWORD }}
          SMOKE_DEBUG_KEY_ALIAS: ${{ secrets.SMOKE_DEBUG_KEY_ALIAS }}
          SMOKE_DEBUG_KEY_PASSWORD: ${{ secrets.SMOKE_DEBUG_KEY_PASSWORD }}
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-daily-mind-map-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Remove smoke debug keystore
        if: always()
        run: rm -f android/app/smoke-debug.keystore
