apply plugin: 'com.android.application'

def presentEnv = { value ->
    return value != null && value.trim().length() > 0
}

def smokeDebugKeystorePath = System.getenv("SMOKE_DEBUG_KEYSTORE_FILE")
def smokeDebugKeystorePassword = System.getenv("SMOKE_DEBUG_KEYSTORE_PASSWORD")
def smokeDebugKeyAlias = System.getenv("SMOKE_DEBUG_KEY_ALIAS")
def smokeDebugKeyPassword = System.getenv("SMOKE_DEBUG_KEY_PASSWORD")
def smokeDebugKeystoreFile = presentEnv(smokeDebugKeystorePath) ? file(smokeDebugKeystorePath) : null
def hasSmokeDebugKeystoreFile = smokeDebugKeystoreFile != null && smokeDebugKeystoreFile.exists()
def hasAnySmokeDebugCredential = [
    smokeDebugKeystorePassword,
    smokeDebugKeyAlias,
    smokeDebugKeyPassword
].any { presentEnv(it) }
def hasSmokeDebugSigning = hasSmokeDebugKeystoreFile &&
    presentEnv(smokeDebugKeystorePassword) &&
    presentEnv(smokeDebugKeyAlias) &&
    presentEnv(smokeDebugKeyPassword)

if ((hasSmokeDebugKeystoreFile || hasAnySmokeDebugCredential) && !hasSmokeDebugSigning) {
    throw new GradleException("Smoke debug signing is partially configured. Set SMOKE_DEBUG_KEYSTORE_FILE, SMOKE_DEBUG_KEYSTORE_PASSWORD, SMOKE_DEBUG_KEY_ALIAS, and SMOKE_DEBUG_KEY_PASSWORD together, and keep the keystore outside the repository.")
}

android {
    namespace = "com.lucita81.youtubedailymindmap"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.lucita81.youtubedailymindmap"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        smokeDebug {
            if (hasSmokeDebugSigning) {
                storeFile smokeDebugKeystoreFile
                storePassword smokeDebugKeystorePassword
                keyAlias smokeDebugKeyAlias
                keyPassword smokeDebugKeyPassword
            }
        }
    }
    buildTypes {
        debug {
            if (hasSmokeDebugSigning) {
                signingConfig signingConfigs.smokeDebug
            }
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
